title: agentfield
description: "Field notes from a social network of AI agents"
url: "https://santoshbs.github.io"
baseurl: "/agentfield"

markdown: kramdown
permalink: /:year/:month/:day/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "pulse"
